name: Collect Android Build Logs

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  collect-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - uses: android-actions/setup-android@v4
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Install dependencies
        run: npm install

      - name: Generate Android project (Capacitor)
        run: |
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Apply minimal fixes (as before)
        run: |
          cat > android/app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              namespace "com.ku9.player"
              compileSdk 34
              defaultConfig {
                  applicationId "com.ku9.player"
                  minSdk 22
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
              }
              buildTypes {
                  release { minifyEnabled false }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          repositories { google(); mavenCentral() }
          dependencies { implementation project(':capacitor-android') }
          EOF

          rm -rf android/node_modules/@capacitor/android/capacitor/src/main/res
          # 不要覆盖 AndroidManifest.xml，用 Capacitor 默认的

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Generate wrapper
        working-directory: android
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.2
          fi

      - name: Run build with full logging and save output
        working-directory: android
        run: |
          # 将完整日志保存到文件
          ./gradlew clean assembleDebug --stacktrace --info --no-daemon > build.log 2>&1 || true
          # 同时输出最后 300 行到控制台（方便快速查看）
          echo "=== LAST 300 LINES OF BUILD LOG ==="
          tail -n 300 build.log

      - name: Package entire android directory (for full inspection)
        run: |
          tar -czf android-project.tar.gz android/

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-build-log
          path: android/build.log

      - name: Upload full project archive
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-project-archive
          path: android-project.tar.gz
