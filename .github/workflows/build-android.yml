name: Build Android APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: npm install

      - name: Generate Android project with Capacitor
        run: |
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Remove all possible SplashScreen resources
        run: |
          # 1. 删除 capacitor-android 模块的所有资源（彻底根除）
          CAP_RES="android/node_modules/@capacitor/android/capacitor/src/main/res"
          if [ -d "$CAP_RES" ]; then
            rm -rf "$CAP_RES"
            echo "Deleted $CAP_RES"
          fi

          # 2. 删除 app 模块中可能存在的 SplashScreen 相关资源（如果有）
          APP_RES="android/app/src/main/res"
          # 清理 values 中可能引用 SplashScreen 的样式
          if [ -f "$APP_RES/values/styles.xml" ]; then
            rm -f "$APP_RES/values/styles.xml"
          fi
          # 删除 drawable 中的 splash 图片（如果有）
          find "$APP_RES" -name "*splash*" -type f -delete 2>/dev/null || true

      - name: Write clean AndroidManifest.xml (no SplashScreen theme)
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="KU9 Player"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name="com.ku9.player.MainActivity"
                      android:exported="true"
                      android:label="KU9 Player"
                      android:theme="@style/AppTheme.NoActionBar">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Write clean styles.xml (no SplashScreen)
        run: |
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="colorPrimary">@color/colorPrimary</item>
                  <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
                  <item name="colorAccent">@color/colorAccent</item>
              </style>
              <style name="AppTheme.NoActionBar" parent="Theme.AppCompat.Light.NoActionBar" />
          </resources>
          EOF

      - name: Write basic colors.xml and strings.xml
        run: |
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#3F51B5</color>
              <color name="colorPrimaryDark">#303F9F</color>
              <color name="colorAccent">#FF4081</color>
          </resources>
          EOF
          cat > android/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">KU9 Player</string>
          </resources>
          EOF

      - name: Write app/build.gradle (with namespace and repositories)
        run: |
          cat > android/app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'

          android {
              namespace "com.ku9.player"
              compileSdk 34

              defaultConfig {
                  applicationId "com.ku9.player"
                  minSdk 22
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          repositories {
              google()
              mavenCentral()
          }

          dependencies {
              implementation project(':capacitor-android')
          }
          EOF

      - name: Write settings.gradle
        run: |
          cat > android/settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
              plugins {
                  id 'com.android.application' version '8.2.0'
              }
          }
          rootProject.name = "MyApp"
          include ':app'
          include ':capacitor-android'
          project(':capacitor-android').projectDir = new File('../node_modules/@capacitor/android/capacitor')
          EOF

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Generate Gradle Wrapper
        working-directory: android
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.2
          fi

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew clean assembleDebug --stacktrace --info --no-daemon

      - name: Build Release APK (unsigned)
        working-directory: android
        run: ./gradlew assembleRelease --stacktrace --no-daemon
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || '' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || '' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || '' }}
        continue-on-error: true

      - name: List build outputs
        run: |
          echo "=== Debug APK ==="
          ls -la android/app/build/outputs/apk/debug/ || echo "No debug output"
          echo "=== Release APK ==="
          ls -la android/app/build/outputs/apk/release/ || echo "No release output"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ku9-player-android-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ku9-player-android-release
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

  release-android:
    needs: build-android
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.apk
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
