name: Build Android APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: npm install

      - name: Ensure Capacitor Android package
        run: |
          if [ ! -d "node_modules/@capacitor/android" ]; then
            echo "Installing @capacitor/android..."
            npm install @capacitor/android@^6.0.0
          fi

      - name: Verify web assets exist
        run: |
          if [ ! -f "src/index.html" ]; then
            echo "ERROR: src/index.html not found!"
            exit 1
          fi
          echo "Web assets found in src/"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Fix missing capacitor-android directory
        run: |
          if [ ! -d "android/node_modules/@capacitor/android/capacitor" ]; then
            echo "Capacitor Android directory missing, creating symlink..."
            mkdir -p android/node_modules/@capacitor/android
            ln -s ../../../node_modules/@capacitor/android/capacitor android/node_modules/@capacitor/android/capacitor
          fi

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Generate Gradle Wrapper with compatible version
        working-directory: android
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Generating Gradle wrapper with version 8.2..."
            gradle wrapper --gradle-version 8.2
          else
            echo "gradle-wrapper.jar exists, skipping generation."
          fi

      - name: Create missing resource files
        run: |
          mkdir -p android/app/src/main/res/values
          # colors.xml
          if [ ! -f android/app/src/main/res/values/colors.xml ]; then
            cat > android/app/src/main/res/values/colors.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <color name="colorPrimary">#0a0a0f</color>
            <color name="colorPrimaryDark">#0a0a0f</color>
            <color name="colorAccent">#FF4081</color>
        </resources>
        EOF
          fi
          # strings.xml
          if [ ! -f android/app/src/main/res/values/strings.xml ]; then
            cat > android/app/src/main/res/values/strings.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <string name="app_name">KU9 Player</string>
            <string name="title_activity_main">KU9 Player</string>
        </resources>
        EOF
          fi
          # styles.xml
          if [ ! -f android/app/src/main/res/values/styles.xml ]; then
            cat > android/app/src/main/res/values/styles.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <style name="AppTheme" parent="Theme.AppCompat.Light.DarkActionBar">
                <item name="colorPrimary">@color/colorPrimary</item>
                <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
                <item name="colorAccent">@color/colorAccent</item>
            </style>
            <style name="AppTheme.NoActionBarLaunch" parent="Theme.AppCompat.Light.NoActionBar">
                <item name="android:windowBackground">@color/colorPrimary</item>
            </style>
        </resources>
        EOF
          fi

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace --info --no-daemon

      - name: Build Release APK (unsigned)
        working-directory: android
        run: ./gradlew assembleRelease --stacktrace --no-daemon
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || '' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || '' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || '' }}
        continue-on-error: true

      - name: List build outputs
        run: |
          echo "=== Debug APK ==="
          ls -la android/app/build/outputs/apk/debug/ || echo "No debug output"
          echo "=== Release APK ==="
          ls -la android/app/build/outputs/apk/release/ || echo "No release output"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ku9-player-android-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ku9-player-android-release
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

  release-android:
    needs: build-android
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.apk
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
