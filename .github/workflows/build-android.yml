name: Build Android APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: npm install

      # ========== 新增：彻底重建 Android 项目 ==========
      - name: Regenerate Android project from scratch
        run: |
          echo "Removing existing android directory..."
          rm -rf android
          echo "Adding Android platform via Capacitor..."
          npx cap add android
          echo "Syncing Capacitor..."
          npx cap sync android
          echo "Android project regenerated."

      # ========== 自动修正 build.gradle 和 AndroidManifest.xml ==========
      - name: Fix Android build configuration
        run: |
          # 修正 build.gradle：添加 namespace，设置 compileSdk 和 targetSdk 为 34
          BUILD_GRADLE="android/app/build.gradle"
          if [ -f "$BUILD_GRADLE" ]; then
            # 用 sed 在 android { 块内添加 namespace（如果不存在）
            if ! grep -q "namespace " "$BUILD_GRADLE"; then
              sed -i '/android {/a \    namespace "com.ku9.player"' "$BUILD_GRADLE"
            fi
            # 确保 compileSdk 为 34
            sed -i 's/compileSdk [0-9]*/compileSdk 34/' "$BUILD_GRADLE"
            # 确保 targetSdk 为 34
            sed -i 's/targetSdk [0-9]*/targetSdk 34/' "$BUILD_GRADLE"
            echo "build.gradle updated."
          else
            echo "Warning: $BUILD_GRADLE not found."
          fi

          # 修正 AndroidManifest.xml：删除 package 属性
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            # 用 sed 删除 manifest 标签中的 package 属性
            sed -i 's/package="[^"]*"//' "$MANIFEST"
            echo "AndroidManifest.xml updated."
          else
            echo "Warning: $MANIFEST not found."
          fi

          # 额外：确保有 colors.xml、strings.xml、styles.xml（模板自带，但以防万一）
          mkdir -p android/app/src/main/res/values
          # 如果缺失则创建基本文件（但模板应已存在）
      # ====================================================

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Generate Gradle Wrapper with compatible version
        working-directory: android
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Generating Gradle wrapper with version 8.2..."
            gradle wrapper --gradle-version 8.2
          else
            echo "gradle-wrapper.jar exists, skipping generation."
          fi

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace --info --no-daemon

      - name: Build Release APK (unsigned)
        working-directory: android
        run: ./gradlew assembleRelease --stacktrace --no-daemon
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || '' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || '' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || '' }}
        continue-on-error: true

      - name: List build outputs
        run: |
          echo "=== Debug APK ==="
          ls -la android/app/build/outputs/apk/debug/ || echo "No debug output"
          echo "=== Release APK ==="
          ls -la android/app/build/outputs/apk/release/ || echo "No release output"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ku9-player-android-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ku9-player-android-release
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

  release-android:
    needs: build-android
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.apk
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
