name: Build Android APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "platform-tools platforms;android-33 build-tools;33.0.0"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: npm install

      - name: Ensure Capacitor Android package
        run: |
          if [ ! -d "node_modules/@capacitor/android" ]; then
            echo "Installing @capacitor/android..."
            npm install @capacitor/android@^6.0.0
          fi

      - name: Verify web assets exist
        run: |
          if [ ! -f "src/index.html" ]; then
            echo "ERROR: src/index.html not found!"
            exit 1
          fi
          echo "Web assets found in src/"

      - name: Sync Capacitor
        run: npx cap sync android

      # 如果同步后目录仍缺失，则手动创建软链接（解决 Gradle 找不到路径的问题）
      - name: Fix missing capacitor-android directory
        run: |
          if [ ! -d "android/node_modules/@capacitor/android/capacitor" ]; then
            echo "Capacitor Android directory missing, creating symlink..."
            mkdir -p android/node_modules/@capacitor/android
            ln -s ../../../node_modules/@capacitor/android/capacitor android/node_modules/@capacitor/android/capacitor
          fi
          # 打印 android 目录结构以便调试
          ls -la android/

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Generate Gradle Wrapper if missing
        working-directory: android
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "gradle-wrapper.jar not found, generating..."
            gradle wrapper
          else
            echo "gradle-wrapper.jar exists, skipping generation."
          fi

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Build Release APK (unsigned)
        working-directory: android
        run: ./gradlew assembleRelease --stacktrace --no-daemon
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || '' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || '' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || '' }}
        continue-on-error: true

      - name: List build outputs
        run: |
          echo "=== Debug APK ==="
          ls -la android/app/build/outputs/apk/debug/ || echo "No debug output"
          echo "=== Release APK ==="
          ls -la android/app/build/outputs/apk/release/ || echo "No release output"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ku9-player-android-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ku9-player-android-release
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

  release-android:
    needs: build-android
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.apk
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
